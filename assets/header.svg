<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="routersys / YMM4 Plugin Developer">
<title>routersys</title>
<defs>
<filter id="n" x="0" y="0" width="100%" height="100%">
<feTurbulence baseFrequency="0.8" numOctaves="1" stitchTiles="stitch"/>
</filter>
<clipPath id="panel">
<rect x="0" y="0" width="1200" height="400"/>
</clipPath>
<style>
.bg { fill: #121110; }
.noise { filter: url(#n); opacity: 0.05; }
.ink { fill: #e9e4d8; }
.dim { fill: #8f887a; }
.shu { fill: #c73e2d; }
.mincho { font-family: "Shippori Mincho B1","Hiragino Mincho ProN","Yu Mincho","YuMincho",serif; }
.mono { font-family: "IBM Plex Mono","SFMono-Regular","Consolas",ui-monospace,monospace; }
.rule { stroke: #e9e4d8; stroke-opacity: 0.14; stroke-width: 1; stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1.1s cubic-bezier(0.22,1,0.36,1) forwards; }
.rule-2 { animation-delay: 0.15s; }
.rule-3 { animation-delay: 0.3s; }
.rule-4 { animation-delay: 0.45s; }
.up { opacity: 0; animation: up 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }
.d1 { animation-delay: 0.25s; }
.d2 { animation-delay: 0.5s; }
.d3 { animation-delay: 0.7s; }
.d4 { animation-delay: 0.9s; }
.d5 { animation-delay: 1.15s; }
.d6 { animation-delay: 1.35s; }
.d7 { animation-delay: 1.55s; }
.tate { opacity: 0; animation: fade 0.7s cubic-bezier(0.22,1,0.36,1) forwards; }
.seal { opacity: 0; animation: seal 0.9s cubic-bezier(0.22,1,0.36,1) 1.9s forwards; transform-origin: 1142px 313px; }
.sweep { stroke: #c73e2d; stroke-width: 1; transform-origin: 40px 272px; animation: sweep 7s cubic-bezier(0.22,1,0.36,1) 1.6s infinite; }
@keyframes draw { to { stroke-dashoffset: 0; } }
@keyframes up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes seal { from { opacity: 0; transform: scale(0.86); } to { opacity: 1; transform: scale(1); } }
@keyframes sweep {
  0% { transform: scaleX(0); transform-origin: 40px 272px; }
  22% { transform: scaleX(1); transform-origin: 40px 272px; }
  60% { transform: scaleX(1); transform-origin: 560px 272px; }
  82%, 100% { transform: scaleX(0); transform-origin: 560px 272px; }
}
</style>
</defs>

<g clip-path="url(#panel)">
<rect class="bg" x="0" y="0" width="1200" height="400"/>
<rect class="noise" x="0" y="0" width="1200" height="400"/>

<line class="rule" x1="0" y1="56" x2="1200" y2="56" pathLength="1"/>
<line class="rule rule-2" x1="0" y1="352" x2="1200" y2="352" pathLength="1"/>
<line class="rule rule-3" x1="860" y1="56" x2="860" y2="352" pathLength="1"/>
<line class="rule rule-4" x1="40" y1="272" x2="560" y2="272" pathLength="1"/>

<g class="up d1">
<text class="mincho ink" x="40" y="36" font-size="15" font-weight="600" letter-spacing="3.6">routersys</text>
</g>
<g class="up d2">
<text class="mono dim" x="1160" y="36" font-size="12" letter-spacing="1.6" text-anchor="end">YMM4 PLUGIN DEVELOPER</text>
</g>

<g class="up d3">
<text class="mono ink" x="40" y="200" font-size="108" font-weight="500" letter-spacing="-3.2">routersys<tspan class="shu">。</tspan></text>
</g>
<g class="up d4">
<text class="mincho dim" x="40" y="244" font-size="15" letter-spacing="3.6">YMM4 のプラグインを作っています</text>
</g>

<line class="sweep" x1="40" y1="272" x2="560" y2="272"/>

<g class="up d5">
<text class="mincho ink" x="40" y="316" font-size="14" letter-spacing="2.2">GitHub</text>
<text class="mincho dim" x="122" y="316" font-size="10" letter-spacing="2.4">ギットハブ</text>
<text class="mincho ink" x="240" y="316" font-size="14" letter-spacing="2.2">X</text>
<text class="mincho dim" x="262" y="316" font-size="10" letter-spacing="2.4">エックス</text>
<text class="mincho ink" x="380" y="316" font-size="14" letter-spacing="2.2">Plugins</text>
<text class="mincho dim" x="452" y="316" font-size="10" letter-spacing="2.4">プラグイン一覧</text>
<text class="mincho ink" x="620" y="316" font-size="14" letter-spacing="2.2">Booth</text>
<text class="mincho dim" x="682" y="316" font-size="10" letter-spacing="2.4">ブース</text>
</g>

<g class="mincho ink" font-size="22" font-weight="500" text-anchor="middle">
<text class="tate" x="1142" y="98" style="animation-delay:1.2s">映</text>
<text class="tate" x="1142" y="128" style="animation-delay:1.28s">像</text>
<text class="tate" x="1142" y="158" style="animation-delay:1.36s">編</text>
<text class="tate" x="1142" y="188" style="animation-delay:1.44s">集</text>
<text class="tate" x="1142" y="218" style="animation-delay:1.52s">の</text>
<text class="tate" x="1149" y="242" style="animation-delay:1.6s">、</text>
<text class="tate" x="1088" y="98" style="animation-delay:1.5s">届</text>
<text class="tate" x="1088" y="128" style="animation-delay:1.58s">く</text>
<text class="tate" x="1088" y="158" style="animation-delay:1.66s">範</text>
<text class="tate" x="1088" y="188" style="animation-delay:1.74s">囲</text>
<text class="tate" x="1088" y="218" style="animation-delay:1.82s">を</text>
<text class="tate" x="1088" y="248" style="animation-delay:1.9s">広</text>
<text class="tate" x="1088" y="278" style="animation-delay:1.98s">げ</text>
<text class="tate" x="1088" y="308" style="animation-delay:2.06s">る</text>
<text class="tate" x="1095" y="332" style="animation-delay:2.14s">。</text>
</g>

<g class="seal">
<rect x="1125" y="288" width="34" height="50" fill="none" stroke="#c73e2d" stroke-width="1.5"/>
<text class="mincho shu" x="1142" y="321" font-size="21" font-weight="600" text-anchor="middle">路</text>
</g>

<g class="up d6">
<text class="mono dim" x="40" y="381" font-size="12" letter-spacing="1.7">© routersys</text>
</g>
<g class="up d7">
<text class="mono dim" x="1160" y="381" font-size="12" letter-spacing="1.7" text-anchor="end">C# / .NET / HLSL / DIRECTX 11 / WPF / ASSIMP / LUA / JAVA</text>
</g>
</g>
</svg>
