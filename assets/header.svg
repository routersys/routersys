<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 980" width="760" height="980" role="img" aria-label="routersys — YMM4 Plugin Developer">
<title>routersys</title>
<defs>
<filter id="n" x="0" y="0" width="100%" height="100%">
<feTurbulence baseFrequency="0.8" numOctaves="1" stitchTiles="stitch"/>
</filter>
<clipPath id="panel">
<rect x="0" y="0" width="760" height="980"/>
</clipPath>
<style>
.bg { fill: #121110; }
.noise { filter: url(#n); opacity: 0.05; }
.ink { fill: #e9e4d8; }
.dim { fill: #8f887a; }
.shu { fill: #c73e2d; }
.mincho { font-family: "Shippori Mincho B1","Hiragino Mincho ProN","Yu Mincho","YuMincho",serif; }
.mono { font-family: "IBM Plex Mono","SFMono-Regular","Consolas",ui-monospace,monospace; }
.rule { stroke: #e9e4d8; stroke-opacity: 0.14; stroke-width: 1; stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1.2s cubic-bezier(0.22,1,0.36,1) forwards; }
.r2 { animation-delay: 0.12s; }
.r3 { animation-delay: 0.24s; }
.r4 { animation-delay: 0.36s; }
.up { opacity: 0; animation: up 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }
.tate { opacity: 0; animation: fade 0.8s cubic-bezier(0.22,1,0.36,1) forwards; }
.seal { opacity: 0; transform-origin: 66px 416px; animation: seal 0.9s cubic-bezier(0.22,1,0.36,1) 1.5s forwards; }
.sweep { stroke: #c73e2d; stroke-width: 1; animation: sweep 7s cubic-bezier(0.22,1,0.36,1) 2.2s infinite; }
@keyframes draw { to { stroke-dashoffset: 0; } }
@keyframes up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes seal { from { opacity: 0; transform: scale(0.84); } to { opacity: 1; transform: scale(1); } }
@keyframes sweep {
  0% { transform: scaleX(0); transform-origin: 40px 700px; }
  22% { transform: scaleX(1); transform-origin: 40px 700px; }
  60% { transform: scaleX(1); transform-origin: 560px 700px; }
  82%, 100% { transform: scaleX(0); transform-origin: 560px 700px; }
}
</style>
</defs>

<g clip-path="url(#panel)">
<rect class="bg" x="0" y="0" width="760" height="980"/>
<rect class="noise" x="0" y="0" width="760" height="980"/>

<line class="rule" x1="0" y1="64" x2="760" y2="64" pathLength="1"/>
<line class="rule r2" x1="0" y1="500" x2="760" y2="500" pathLength="1"/>
<line class="rule r3" x1="40" y1="700" x2="560" y2="700" pathLength="1"/>
<line class="rule r4" x1="0" y1="880" x2="760" y2="880" pathLength="1"/>

<g class="up">
<text class="mincho ink" x="40" y="41" font-size="18" font-weight="600" letter-spacing="4.3">routersys</text>
</g>
<g class="up" style="animation-delay:0.15s">
<text class="mono dim" x="720" y="41" font-size="13" letter-spacing="1.8" text-anchor="end">YMM4 PLUGIN DEVELOPER</text>
</g>

<g class="mincho ink" font-size="34" font-weight="500" text-anchor="middle">
<text class="tate" x="700" y="130" style="animation-delay:0.3s">映</text>
<text class="tate" x="700" y="172" style="animation-delay:0.38s">像</text>
<text class="tate" x="700" y="214" style="animation-delay:0.46s">編</text>
<text class="tate" x="700" y="256" style="animation-delay:0.54s">集</text>
<text class="tate" x="700" y="298" style="animation-delay:0.62s">の</text>
<text class="tate" x="711" y="331" style="animation-delay:0.7s">、</text>
<text class="tate" x="640" y="130" style="animation-delay:0.62s">届</text>
<text class="tate" x="640" y="172" style="animation-delay:0.7s">く</text>
<text class="tate" x="640" y="214" style="animation-delay:0.78s">範</text>
<text class="tate" x="640" y="256" style="animation-delay:0.86s">囲</text>
<text class="tate" x="640" y="298" style="animation-delay:0.94s">を</text>
<text class="tate" x="640" y="340" style="animation-delay:1.02s">広</text>
<text class="tate" x="640" y="382" style="animation-delay:1.1s">げ</text>
<text class="tate" x="640" y="424" style="animation-delay:1.18s">る</text>
<text class="tate" x="651" y="457" style="animation-delay:1.26s">。</text>
</g>

<g class="seal">
<rect x="40" y="378" width="52" height="76" fill="none" stroke="#c73e2d" stroke-width="1.5"/>
<text class="mincho shu" x="66" y="426" font-size="32" font-weight="600" text-anchor="middle">路</text>
</g>

<g class="up" style="animation-delay:0.9s">
<text class="mono ink" x="40" y="608" font-size="96" font-weight="500" letter-spacing="-2.9">routersys<tspan class="shu">。</tspan></text>
</g>
<g class="up" style="animation-delay:1.05s">
<text class="mincho dim" x="40" y="660" font-size="17" letter-spacing="4.1">YMM4 のプラグインを作っています</text>
</g>

<line class="sweep" x1="40" y1="700" x2="560" y2="700"/>

<g class="up" style="animation-delay:1.3s">
<text class="mincho ink" x="40" y="756" font-size="22" letter-spacing="1.8">GitHub</text>
<text class="mincho dim" x="146" y="756" font-size="12" letter-spacing="3.6">ギットハブ</text>
<text class="mincho ink" x="400" y="756" font-size="22" letter-spacing="1.8">X</text>
<text class="mincho dim" x="432" y="756" font-size="12" letter-spacing="3.6">エックス</text>
</g>
<g class="up" style="animation-delay:1.42s">
<text class="mincho ink" x="40" y="818" font-size="22" letter-spacing="1.8">Plugins</text>
<text class="mincho dim" x="146" y="818" font-size="12" letter-spacing="3.6">プラグイン一覧</text>
<text class="mincho ink" x="400" y="818" font-size="22" letter-spacing="1.8">Booth</text>
<text class="mincho dim" x="490" y="818" font-size="12" letter-spacing="3.6">ブース</text>
</g>

<g class="up" style="animation-delay:1.6s">
<text class="mono dim" x="40" y="918" font-size="14" letter-spacing="2">© routersys</text>
</g>
<g class="up" style="animation-delay:1.72s">
<text class="mono dim" x="40" y="950" font-size="13" letter-spacing="1.8">C# / .NET / HLSL / DIRECTX 11 / WPF / ASSIMP / LUA / JAVA</text>
</g>
</g>
</svg>
